name: Nightly build

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nightly-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run build
        id: build
        run: |
          set +e
          node scripts/build-flags.mjs
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          case "$code" in
            0) echo "Build clean." ;;
            2) echo "::error::Shrink/prune guard tripped (exit 2). Refusing to commit."; exit 2 ;;
            3) echo "::warning::Build partial (exit 3). Will commit available improvements." ;;
            *) echo "::error::Build failed (exit $code)."; exit "$code" ;;
          esac

      - name: Stage changes
        id: stage
        run: |
          git add -A \
            data/flags.json \
            data/non-flag-qids.json \
            data/review.json \
            data/.cache/redirects.json \
            flags/thumb \
            flags/full
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.stage.outputs.changed == 'true'
        env:
          BUILD_EXIT: ${{ steps.build.outputs.exit_code }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          flags_count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/flags.json','utf8')).flags.length)")
          subject="nightly build: ${flags_count} flags"
          if [ "$BUILD_EXIT" = "3" ]; then
            subject="$subject (partial)"
          fi
          git commit -m "$subject" -m "Generated by .github/workflows/nightly-build.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          git push
