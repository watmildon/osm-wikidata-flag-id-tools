name: Scheduled build

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scheduled-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run build
        id: build
        run: |
          set +e
          node scripts/build-flags.mjs
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          case "$code" in
            0) echo "Build clean." ;;
            2) echo "::error::Shrink/prune guard tripped (exit 2). Refusing to commit."; exit 2 ;;
            3) echo "::warning::Build partial (exit 3). Will commit available improvements." ;;
            *) echo "::error::Build failed (exit $code)."; exit "$code" ;;
          esac

      - name: Re-check Wikidata for new images and reclassified entities
        # Catch Wikidata edits to records we already have. Without this, a flag
        # that gains a P18 image (or gets its isFlagEntity P31/P279* fixed)
        # would stay imageless / misclassified forever, because the main build's
        # source-of-truth model skips known QIDs.
        # Soft-fails: a SPARQL outage here shouldn't block the count refresh.
        continue-on-error: true
        run: |
          node scripts/refresh-wikidata.mjs --missing-images --not-flag-entity

      - name: Stage changes
        id: stage
        run: |
          git add -A \
            data/flags.json \
            data/non-flag-qids.json \
            data/review.json \
            data/.cache/redirects.json \
            flags/thumb \
            flags/full
          # Treat a diff whose only change is the "generated" timestamp as
          # no-op churn. Strip those lines before judging the diff so the
          # nightly doesn't commit purely-cosmetic timestamp bumps every 6h.
          substantive=$(git diff --cached -U0 | grep -E '^[+-]' | grep -vE '^[+-]{3}' | grep -vE '^[+-]\s*"generated":' || true)
          if [ -z "$substantive" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No substantive changes to commit (timestamp-only diff ignored)."
            git diff --cached --stat || true
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.stage.outputs.changed == 'true'
        env:
          BUILD_EXIT: ${{ steps.build.outputs.exit_code }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          flags_count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/flags.json','utf8')).flags.length)")
          subject="scheduled build: ${flags_count} flags"
          if [ "$BUILD_EXIT" = "3" ]; then
            subject="$subject (partial)"
          fi
          git commit -m "$subject" -m "Generated by .github/workflows/nightly-build.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          git push
