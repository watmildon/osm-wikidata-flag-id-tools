name: Rebuild on overrides change

# Triggered when data/overrides.json changes on main (i.e. when someone
# applies curated edits — locally via `npm run apply:overrides` and pushes,
# or by editing the file directly on GitHub). Regenerates flags.json,
# review.json, and any thumbnail churn so the deployed site reflects the
# new overrides immediately rather than waiting for the next nightly.
#
# Won't loop: this workflow commits flags.json + friends, but NOT
# overrides.json, so its own push doesn't re-trigger the path filter.

on:
  push:
    branches: [main]
    paths:
      - "data/overrides.json"
      - "flags/local/**"
  workflow_dispatch: {}

permissions:
  contents: write

# Share a concurrency group with the scheduled build so the two can't
# race on `git push`. cancel-in-progress: false means if the scheduled
# build is mid-run we wait for it rather than killing it.
concurrency:
  group: scheduled-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run build
        id: build
        run: |
          set +e
          node scripts/build-flags.mjs
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          case "$code" in
            0) echo "Build clean." ;;
            2) echo "::error::Shrink/prune guard tripped (exit 2). Refusing to commit."; exit 2 ;;
            3) echo "::warning::Build partial (exit 3). Will commit available improvements." ;;
            *) echo "::error::Build failed (exit $code)."; exit "$code" ;;
          esac

      - name: Stage changes
        id: stage
        run: |
          # Same set of paths the scheduled build stages. Intentionally
          # NOT including data/overrides.json — that's the trigger, not
          # an output, and re-staging it would let a future change here
          # accidentally retrigger this workflow.
          git add -A \
            data/flags.json \
            data/non-flag-qids.json \
            data/review.json \
            data/.cache/redirects.json \
            flags/thumb \
            flags/full
          # Strip pure timestamp churn so we don't make a commit that
          # only changes the "generated" line.
          substantive=$(git diff --cached -U0 | grep -E '^[+-]' | grep -vE '^[+-]{3}' | grep -vE '^[+-]\s*"generated":' || true)
          if [ -z "$substantive" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No substantive changes to commit (timestamp-only diff ignored)."
            git diff --cached --stat || true
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.stage.outputs.changed == 'true'
        env:
          BUILD_EXIT: ${{ steps.build.outputs.exit_code }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          flags_count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/flags.json','utf8')).flags.length)")
          subject="rebuild after overrides change: ${flags_count} flags"
          if [ "$BUILD_EXIT" = "3" ]; then
            subject="$subject (partial)"
          fi
          git commit -m "$subject" -m "Generated by .github/workflows/rebuild-on-overrides.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          git push
