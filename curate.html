<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Curate — OSM Flag Identifier</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
</head>
<body class="curate">
  <header class="topbar">
    <h1>Curate flags</h1>
    <p class="hint">
      <span id="queue-pos">—</span>
      &middot; <a href="index.html">back to identifier</a>
    </p>
    <div class="chips needs-chips" id="needs-chips" role="group" aria-label="Show flags missing"></div>
  </header>

  <main class="curate-main">
    <section class="curate-flag">
      <span class="flip-img-wrap-block" id="flag-img-wrap"><img id="flag-img" alt="" /></span>
      <div class="curate-meta">
        <h2 id="flag-name">—</h2>
        <p class="meta-line">
          <a id="flag-link" href="#" target="_blank" rel="noopener"></a>
          &middot; <span id="flag-count">—</span> OSM uses
          &middot; <span id="flag-entity-state"></span>
        </p>
      </div>
    </section>

    <section class="filter-group">
      <h2>Display name <span class="hint-inline">(flag:name)</span></h2>
      <input id="name-input" class="text-input" type="text" autocomplete="off" spellcheck="false" />
    </section>

    <section class="filter-group">
      <h2>Description <span class="hint-inline">(lead with the visual)</span></h2>
      <textarea id="description-input" class="text-input description-input" rows="3" spellcheck="true" placeholder="e.g. Three equal horizontal bands of red (top), white, and blue, with a yellow star centered."></textarea>
    </section>

    <section class="filter-group">
      <h2>flag:type</h2>
      <div class="chips" id="type-chips" role="group" aria-label="Set flag:type"></div>
    </section>

    <section class="filter-group">
      <h2>Colors</h2>
      <div class="chips" id="color-chips" role="group" aria-label="Set colors"></div>
    </section>

    <section class="filter-group">
      <h2>Iconography</h2>
      <div class="chips" id="icon-chips" role="group" aria-label="Set iconography"></div>
    </section>

    <section class="filter-group">
      <h2>Shape</h2>
      <div class="chips" id="shape-chips" role="group" aria-label="Set shape"></div>
    </section>

    <div class="curate-actions">
      <button id="skip-btn" class="action-secondary" type="button">Skip</button>
      <button id="save-btn" class="action-primary" type="button">Save &amp; next</button>
    </div>

    <section class="curate-filter-bar">
      <label class="check"><input type="checkbox" id="randomize-queue" checked /> Random order <span class="hint-inline">(reduces collisions when multiple people curate)</span></label>
      <label class="check"><input type="checkbox" id="hide-non-flag-entities" /> Hide non-flag QIDs</label>
    </section>
  </main>

  <footer class="curate-footer">
    <span><strong id="pending-count">0</strong> pending edits</span>
    <button id="export-btn" class="action-primary" type="button" disabled>Export overrides.json</button>
    <button id="clear-pending-btn" class="action-secondary" type="button" disabled>Discard</button>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/curate.js"></script>
</body>
</html>
