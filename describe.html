<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Describe — OSM Flag Identifier</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <style>
    :root { --row-h: 240px; }
    @media (max-width: 640px) { :root { --row-h: 390px; } }

    .describe-main {
      padding: 0 16px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .describe-filterbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 4;
    }
    .describe-filterbar input[type="search"] {
      flex: 1;
      min-width: 180px;
      font-family: inherit;
      font-size: 0.9375rem;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elev);
      color: var(--fg);
    }
    .describe-filterbar .check {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      font-size: 0.875rem;
      color: var(--fg);
      cursor: pointer;
    }
    .describe-filterbar select {
      font-family: inherit;
      font-size: 0.875rem;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elev);
      color: var(--fg);
    }
    #visible-count {
      font-size: 0.8125rem;
      color: var(--muted);
    }

    /* Virtualization: outer pads to total height; inner is absolutely
       positioned and translated to the windowed slice. Each row is fixed
       to --row-h so we can compute scroll positions arithmetically. */
    .vlist-outer {
      position: relative;
      width: 100%;
    }
    .vlist-inner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      will-change: transform;
    }
    .describe-row {
      box-sizing: border-box;
      height: var(--row-h);
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .describe-row .img-cell {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    /* Checker pattern instead of solid white so all-white flags
       (Nepal, Vatican, etc.) stay visible against the page. */
    .describe-row img {
      max-width: 200px;
      max-height: 160px;
      width: auto;
      height: auto;
      background-color: var(--bg-elev);
      background-image:
        linear-gradient(45deg, var(--border) 25%, transparent 25%),
        linear-gradient(-45deg, var(--border) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--border) 75%),
        linear-gradient(-45deg, transparent 75%, var(--border) 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .describe-row .meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .describe-row .meta h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .describe-row .meta .line {
      color: var(--muted);
      font-size: 0.875rem;
      margin: 0;
    }
    .describe-row .meta .line a { color: var(--accent); }
    .describe-row textarea {
      width: 100%;
      flex: 1;
      min-height: 70px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.4;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elev);
      color: var(--fg);
      resize: none;
    }
    .describe-row textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }
    .describe-row.edited textarea {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 6%, var(--bg-elev));
    }
    .describe-row .edited-tag {
      display: none;
      font-size: 0.6875rem;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border: 1px solid var(--accent);
      border-radius: 4px;
    }
    .describe-row.edited .edited-tag { display: inline-block; }
    .describe-row .missing-tag {
      display: none;
      font-size: 0.6875rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .describe-row.no-desc .missing-tag { display: inline-block; }

    .describe-toolbar {
      position: sticky;
      bottom: 0;
      background: var(--bg-elev);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 5;
      flex-wrap: wrap;
    }
    .describe-toolbar .spacer { flex: 1; }
    .describe-toolbar button {
      min-height: 36px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--fg);
      cursor: pointer;
      font-size: 0.9375rem;
    }
    .describe-toolbar button.primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }
    .describe-toolbar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status { font-size: 0.875rem; color: var(--muted); }
    .empty {
      padding: 80px 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.9375rem;
    }
    @media (max-width: 640px) {
      .describe-row { grid-template-columns: 1fr; }
      .describe-row img { max-height: 120px; }
    }

  </style>
</head>
<body>
  <header class="topbar">
    <h1>Describe flags</h1>
    <p class="hint">
      Review and edit visual descriptions for every flag in the dataset.
      Lead with the visual (colors, layout, charges) &mdash; no history or adoption dates.
      &middot; <a href="index.html">back to identifier</a>
      &middot; <a href="backoffice.html">back office</a>
    </p>
  </header>

  <main class="describe-main">
    <div class="describe-filterbar">
      <input type="search" id="search-input" placeholder="Search name or description…" autocomplete="off" spellcheck="false" />
      <label class="check"><input type="checkbox" id="filter-no-desc" /> Missing description only</label>
      <label class="check" title="Hide descriptions that already have at least one curator 'Looks good' review."><input type="checkbox" id="filter-unreviewed" /> Unreviewed only</label>
      <label class="check"><input type="checkbox" id="filter-has-image" checked /> Has image only</label>
      <label class="check" title="Hide records whose Wikidata entity isn't classified as a flag — must reach Q14660 / Q69506823 / Q17335294 via P31/P279* or pure P279*. These typically have a photo of the subject as P18 rather than an actual flag image."><input type="checkbox" id="filter-is-flag-entity" checked /> Flag entities only</label>
      <label class="check" title="Hide images whose filename suggests a building, photo, map, or other non-flag content (e.g. JPGs with 'view', 'headquarters', 'street' in the name)."><input type="checkbox" id="filter-hide-wonky" checked /> Hide likely non-flag images</label>
      <select id="sort-select" aria-label="Sort order">
        <option value="count-desc">OSM count (high → low)</option>
        <option value="count-asc">OSM count (low → high)</option>
        <option value="reviews-asc">Least reviewed first</option>
        <option value="name-asc">Name (A → Z)</option>
        <option value="qid-asc">QID (numeric)</option>
      </select>
      <span id="visible-count"></span>
    </div>

    <div class="vlist-outer" id="vlist-outer">
      <div class="vlist-inner" id="vlist-inner"></div>
    </div>
    <div class="empty" id="empty" hidden>No flags match the current filters.</div>
  </main>

  <div class="describe-toolbar">
    <span id="status">Loading…</span>
    <span class="spacer"></span>
    <button id="reset-btn" type="button" disabled>Discard edits</button>
    <button id="export-btn" type="button" class="primary" disabled>Export overrides.json</button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import {
      initEditing,
      pendingCount,
      effectiveField,
      isEdited,
      setField,
      clearPending,
      onPendingChange,
      onReviewReset,
      reviewCount,
      reviewedHere,
      toggleReview,
      exportOverrides,
    } from "./js/editing.js";
    import { attachFlipControl } from "./js/flip.js";
    import { mountLightbox } from "./js/lightbox.js";

    const BUFFER_ROWS = 4; // render this many extra rows above/below the viewport

    function showToast(msg, ms = 1800) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), ms);
    }

    function thumbSrc(flag) {
      if (flag.imageWithheld) return "flags/placeholder.svg";
      if (flag.localFile) return `flags/local/${flag.localFile}`;
      if (!flag.file) return "flags/placeholder.svg";
      return `flags/full/${flag.qid}.png`;
    }

    function qidNum(qid) { return parseInt(qid.slice(1), 10); }

    // ----- module state -----
    let allFlags = [];
    let visibleFlags = [];
    let rowHeight = 0;

    // Filter defaults. Search is intentionally NOT persisted (transient
    // lookup state); checkboxes and sort are remembered across reloads.
    const FILTER_STORAGE_KEY = "osm-flag-filters-describe";
    const FILTER_DEFAULTS = {
      noDescOnly: false,
      unreviewedOnly: false,
      hasImageOnly: true,
      flagEntityOnly: true,
      hideWonky: true,
      sort: "count-desc",
    };
    function loadFilterPrefs() {
      try {
        const raw = JSON.parse(localStorage.getItem(FILTER_STORAGE_KEY) ?? "null");
        if (raw && typeof raw === "object") return { ...FILTER_DEFAULTS, ...raw };
      } catch {}
      return { ...FILTER_DEFAULTS };
    }
    function saveFilterPrefs() {
      const { search: _omit, ...persisted } = filters;
      try { localStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify(persisted)); }
      catch {}
    }
    const filters = { search: "", ...loadFilterPrefs() };

    // See review pages for the rationale on these heuristics. Kept inline
    // here because the page can be loaded standalone via Pages.
    const FLAG_FILENAME_RE = /^(flag|bandera|bandiera|drapeau|vlag|bandeira|flagga|flagge|flaga|fahne|byrak|zastava|prapor|drapelul)/i;
    const WONKY_FILENAME_RE = /headquarter|\bview\b|entrance|stadium|\bpark\b|street|\bcenter\b|building|\bhotel\b|\bstore\b|\bstation\b|\bhall\b|library|fountain|harbor|\btower\b|hospital|circuit|college|university|plaza|airport|riverside|montage|skyline|panorama|aerial|location[ -]?map|orthographic|locator|collage|cathedral|church|castle|courthouse|capitol/i;

    function imageFilename(flag) {
      if (flag.imageWithheld) return null;
      return flag.localFile || flag.file || null;
    }
    function looksLikeFlagFilename(filename) {
      if (!filename) return false;
      if (filename.toLowerCase().endsWith(".svg")) return true;
      return FLAG_FILENAME_RE.test(filename);
    }
    function looksWonkyFilename(filename) {
      if (!filename) return false;
      if (looksLikeFlagFilename(filename)) return false;
      if (WONKY_FILENAME_RE.test(filename.toLowerCase())) return true;
      if (/\.(jpe?g|tiff?)$/i.test(filename)) return true;
      return false;
    }

    // Click-to-zoom lightbox: row images open a larger view so descriptions
    // can be checked against fine detail. Mounted once; attachZoom is called
    // per row in buildRow and is a no-op for placeholder images.
    const { attachZoom } = mountLightbox(thumbSrc);

    function effectiveDescription(flag) {
      // Goes through the shared editing layer so the most recent pending
      // edit wins, then committed overrides, then the flag's own value.
      return effectiveField(flag.qid, "description") ?? "";
    }

    function applyFilters() {
      const q = filters.search.trim().toLowerCase();
      let list = allFlags.filter((f) => {
        if (filters.hasImageOnly && !f.file && !f.localFile) return false;
        if (filters.noDescOnly && effectiveDescription(f)) return false;
        if (filters.unreviewedOnly && reviewCount(f.qid, "description") > 0) return false;
        if (filters.flagEntityOnly && !f.isFlagEntity) return false;
        if (filters.hideWonky && looksWonkyFilename(imageFilename(f))) return false;
        if (q) {
          const hay = (f.name + " " + (f.flagName ?? "") + " " + effectiveDescription(f)).toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      switch (filters.sort) {
        case "count-desc": list.sort((a, b) => (b.count ?? 0) - (a.count ?? 0)); break;
        case "count-asc":  list.sort((a, b) => (a.count ?? 0) - (b.count ?? 0)); break;
        case "reviews-asc":
          // Tiebreak by OSM count desc so among equally-unreviewed flags, the
          // most-mapped ones surface first. Mirrors the review-* pages.
          list.sort((a, b) => {
            const diff = reviewCount(a.qid, "description") - reviewCount(b.qid, "description");
            if (diff !== 0) return diff;
            return (b.count ?? 0) - (a.count ?? 0);
          });
          break;
        case "name-asc":   list.sort((a, b) => (a.flagName ?? a.name).localeCompare(b.flagName ?? b.name)); break;
        case "qid-asc":    list.sort((a, b) => qidNum(a.qid) - qidNum(b.qid)); break;
      }
      visibleFlags = list;
      document.getElementById("visible-count").textContent =
        `${visibleFlags.length.toLocaleString()} of ${allFlags.length.toLocaleString()} shown`;
      const emptyEl = document.getElementById("empty");
      const outerEl = document.getElementById("vlist-outer");
      if (visibleFlags.length === 0) {
        emptyEl.hidden = false;
        outerEl.style.height = "0px";
      } else {
        emptyEl.hidden = true;
        outerEl.style.height = (visibleFlags.length * rowHeight) + "px";
      }
      renderWindow(true);
    }

    function buildRow(flag) {
      const row = document.createElement("section");
      row.className = "describe-row";
      row.dataset.qid = flag.qid;
      const current = effectiveDescription(flag);
      if (isEdited(flag.qid, "description")) row.classList.add("edited");
      if (!current) row.classList.add("no-desc");

      const imgCell = document.createElement("div");
      imgCell.className = "img-cell";
      const imgWrap = document.createElement("span");
      imgWrap.className = "flip-img-wrap";
      const img = document.createElement("img");
      img.loading = "lazy";
      img.decoding = "async";
      img.alt = `Flag of ${flag.name}`;
      img.src = thumbSrc(flag);
      img.onerror = () => { img.src = "flags/placeholder.svg"; };
      imgWrap.appendChild(img);
      // Flag with a distinct reverse side: add the in-place flip control.
      // thumbSrc here is the full-size obverse, matching reverseSrc's full
      // reverse. No-op for flags without a reverse.
      attachFlipControl(imgWrap, img, flag, thumbSrc);
      // Click-to-zoom: open the larger view via the shared lightbox.
      // No-op for placeholder/withheld images.
      attachZoom(img, flag);
      imgCell.appendChild(imgWrap);

      const meta = document.createElement("div");
      meta.className = "meta";

      const h = document.createElement("h3");
      h.appendChild(document.createTextNode(flag.flagName ?? flag.name));
      const editedTag = document.createElement("span");
      editedTag.className = "edited-tag";
      editedTag.textContent = "Edited";
      h.appendChild(editedTag);
      const missingTag = document.createElement("span");
      missingTag.className = "missing-tag";
      missingTag.textContent = "No description";
      h.appendChild(missingTag);
      // Review-count badge. Always rendered so the layout doesn't shift when
      // the count changes 0 → 1 mid-session.
      const reviewBadge = document.createElement("span");
      reviewBadge.className = "review-badge";
      function paintReviewBadge() {
        const n = reviewCount(flag.qid, "description");
        reviewBadge.textContent = n === 0 ? "0 reviews" : `${n} review${n === 1 ? "" : "s"}`;
        reviewBadge.classList.toggle("zero", n === 0);
      }
      paintReviewBadge();
      h.appendChild(reviewBadge);
      meta.appendChild(h);

      const line = document.createElement("p");
      line.className = "line";
      const a = document.createElement("a");
      a.href = `https://www.wikidata.org/wiki/${flag.qid}`;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = flag.qid;
      line.appendChild(a);
      line.append(` · ${(flag.count ?? 0).toLocaleString()} OSM uses`);
      if (flag.flagType) line.append(` · ${flag.flagType}`);
      meta.appendChild(line);

      const ta = document.createElement("textarea");
      ta.spellcheck = true;
      ta.placeholder = "Lead with the visual: colors, layout, charges. E.g. \"A red field with a centered white star.\"";
      ta.value = current;
      ta.addEventListener("input", () => {
        // Empty string → drop the override entirely so the user can clear a
        // description by emptying the textarea. setField handles the
        // baseline equality check (typing back to the original value is a
        // no-op edit and gets dropped automatically).
        const v = ta.value;
        setField(flag.qid, "description", v === "" ? undefined : v);
        // Update the row's "Edited" styling immediately rather than waiting
        // for the next render window pass.
        if (isEdited(flag.qid, "description")) row.classList.add("edited");
        else row.classList.remove("edited");
        // Can't sign off on an empty description — keep the button gated as
        // the user types/clears, rather than waiting for a re-render.
        syncReviewBtnEnabled();
      });
      meta.appendChild(ta);

      // "Looks good" → toggles the description review counter for this
      // browser. First click increments, second click undoes. Mirrors the
      // review-colors / review-icons action row. Disabled when there's no
      // description to sign off on (an edit that empties it re-gates it; the
      // shared editing layer also resets the counter to 0 on any value
      // change, surfaced via the onReviewReset toast below).
      const actionRow = document.createElement("div");
      actionRow.className = "row-actions";
      const reviewBtn = document.createElement("button");
      reviewBtn.type = "button";
      reviewBtn.className = "review-btn";
      function paintReviewBtn() {
        if (reviewedHere(flag.qid, "description")) {
          reviewBtn.textContent = "✓ Reviewed (click to undo)";
          reviewBtn.classList.add("reviewed");
        } else {
          reviewBtn.textContent = "Looks good";
          reviewBtn.classList.remove("reviewed");
        }
      }
      function syncReviewBtnEnabled() {
        // Allow undo even on an empty description so a stale ✓ can be cleared.
        const hasDesc = Boolean(effectiveDescription(flag));
        reviewBtn.disabled = !hasDesc && !reviewedHere(flag.qid, "description");
        reviewBtn.title = reviewBtn.disabled
          ? "Add a description before marking it reviewed."
          : "";
      }
      paintReviewBtn();
      syncReviewBtnEnabled();
      reviewBtn.addEventListener("click", () => {
        toggleReview(flag.qid, "description");
        paintReviewBadge();
        paintReviewBtn();
        syncReviewBtnEnabled();
      });
      actionRow.appendChild(reviewBtn);
      meta.appendChild(actionRow);

      row.appendChild(imgCell);
      row.appendChild(meta);
      return row;
    }

    // ----- virtualization -----
    // Strategy: never recycle DOM nodes — just re-render the visible window
    // on scroll. Cheap because each window is ~10–20 rows. Skips re-rendering
    // any row that's currently focused (to preserve caret/selection).
    let lastStart = -1, lastEnd = -1;
    function renderWindow(force) {
      if (visibleFlags.length === 0) {
        document.getElementById("vlist-inner").innerHTML = "";
        return;
      }
      const scrollTop = window.scrollY || document.documentElement.scrollTop;
      const viewportH = window.innerHeight;
      const outerTop = document.getElementById("vlist-outer").offsetTop;
      const relTop = Math.max(0, scrollTop - outerTop);
      const startIdx = Math.max(0, Math.floor(relTop / rowHeight) - BUFFER_ROWS);
      const endIdx = Math.min(
        visibleFlags.length,
        Math.ceil((relTop + viewportH) / rowHeight) + BUFFER_ROWS,
      );
      if (!force && startIdx === lastStart && endIdx === lastEnd) return;
      lastStart = startIdx;
      lastEnd = endIdx;

      const inner = document.getElementById("vlist-inner");
      const activeQid = (document.activeElement?.closest?.(".describe-row")?.dataset.qid) ?? null;
      let activeSelStart = 0, activeSelEnd = 0;
      if (activeQid && document.activeElement.tagName === "TEXTAREA") {
        activeSelStart = document.activeElement.selectionStart;
        activeSelEnd = document.activeElement.selectionEnd;
      }
      inner.style.transform = `translateY(${startIdx * rowHeight}px)`;
      inner.innerHTML = "";
      const frag = document.createDocumentFragment();
      for (let i = startIdx; i < endIdx; i++) {
        frag.appendChild(buildRow(visibleFlags[i]));
      }
      inner.appendChild(frag);

      if (activeQid) {
        const restored = inner.querySelector(`.describe-row[data-qid="${activeQid}"] textarea`);
        if (restored) {
          restored.focus();
          try { restored.setSelectionRange(activeSelStart, activeSelEnd); } catch {}
        }
      }
    }

    function updateToolbar() {
      const n = pendingCount();
      const status = document.getElementById("status");
      const exportBtn = document.getElementById("export-btn");
      const resetBtn = document.getElementById("reset-btn");
      status.textContent = n === 0 ? "No edits" : `${n} edit${n === 1 ? "" : "s"} pending`;
      exportBtn.disabled = n === 0;
      resetBtn.disabled = n === 0;
    }

    function measureRowHeight() {
      const probe = document.createElement("div");
      probe.style.position = "absolute";
      probe.style.visibility = "hidden";
      probe.style.height = "var(--row-h)";
      probe.style.width = "1px";
      document.body.appendChild(probe);
      const h = probe.getBoundingClientRect().height;
      document.body.removeChild(probe);
      return h || 200;
    }

    async function main() {
      let flagsData;
      try {
        const res = await fetch("data/flags.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        flagsData = await res.json();
      } catch (err) {
        document.getElementById("status").textContent = `Failed to load flags.json: ${err.message}`;
        return;
      }
      allFlags = flagsData.flags ?? [];
      rowHeight = measureRowHeight();

      // Initialize the shared editing layer. This loads committed overrides,
      // migrates any legacy per-page localStorage bag (old key:
      // osm-flag-describe-pending) into the new shared one, and smart-prunes
      // pending fields that already match the baseline.
      const { prunedCount } = await initEditing(allFlags);
      if (prunedCount > 0) {
        setTimeout(() => showToast(
          `Cleared ${prunedCount} edit${prunedCount === 1 ? "" : "s"} already in overrides.json`,
          3000,
        ), 100);
      }

      onPendingChange(updateToolbar);

      // Surface "your edit cleared prior reviewers' approval of this
      // description". Toast the user, then re-render so the row's review
      // badge and "Looks good" button repaint their new (zero) state. The
      // render window preserves the focused textarea's caret/selection, so
      // rebuilding mid-edit is safe.
      onReviewReset(({ prevCount }) => {
        showToast(
          `Cleared ${prevCount} prior review${prevCount === 1 ? "" : "s"} — description changed`,
          2500,
        );
        renderWindow(true);
      });

      // Wire up filter controls.
      const searchInput = document.getElementById("search-input");
      let searchTimer = null;
      searchInput.addEventListener("input", (e) => {
        clearTimeout(searchTimer);
        const v = e.target.value;
        searchTimer = setTimeout(() => {
          filters.search = v;
          window.scrollTo({ top: 0 });
          applyFilters();
        }, 120);
      });
      // Sync DOM controls to persisted state BEFORE attaching change
      // handlers — otherwise the checkboxes show HTML defaults while the
      // filter logic uses the loaded preferences.
      const checkboxFilters = [
        ["filter-no-desc",         "noDescOnly"],
        ["filter-unreviewed",      "unreviewedOnly"],
        ["filter-has-image",       "hasImageOnly"],
        ["filter-is-flag-entity",  "flagEntityOnly"],
        ["filter-hide-wonky",      "hideWonky"],
      ];
      for (const [id, key] of checkboxFilters) {
        const el = document.getElementById(id);
        el.checked = Boolean(filters[key]);
        el.addEventListener("change", (e) => {
          filters[key] = e.target.checked;
          saveFilterPrefs();
          window.scrollTo({ top: 0 });
          applyFilters();
        });
      }
      const sortEl = document.getElementById("sort-select");
      sortEl.value = filters.sort;
      sortEl.addEventListener("change", (e) => {
        filters.sort = e.target.value;
        saveFilterPrefs();
        window.scrollTo({ top: 0 });
        applyFilters();
      });

      let rafPending = false;
      function onScroll() {
        if (rafPending) return;
        rafPending = true;
        requestAnimationFrame(() => {
          rafPending = false;
          renderWindow(false);
        });
      }
      window.addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("resize", () => {
        rowHeight = measureRowHeight();
        applyFilters();
      });

      document.getElementById("export-btn").addEventListener("click", async () => {
        const n = pendingCount();
        const { method } = await exportOverrides();
        if (method === "direct") {
          showToast(`Saved ${n} edits to overrides.json`);
        } else {
          showToast(`Downloaded ${n} edits — save into data/overrides.json`);
        }
      });
      document.getElementById("reset-btn").addEventListener("click", () => {
        if (!confirm("Discard all pending edits?")) return;
        clearPending();
        // Easiest way to re-render every row's textarea baseline: reload.
        location.reload();
      });

      applyFilters();
      updateToolbar();
    }

    main();
  </script>
</body>
</html>
