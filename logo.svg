<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 20 260 260" width="300" height="300" role="img" aria-label="OSM Flag Identifier logo">
  <!-- Flag-on-pole filling the same area the green map quadrants occupied,
       beneath the magnifying glass. Drawn directly in the outer viewBox. -->
  <!-- Pole, finial, and base in the same dark grey as the magnifier. -->
  <g fill="#2f2f2f">
    <circle cx="78" cy="40" r="7"/>
    <rect x="75" y="46" width="6" height="220" rx="2"/>
    <rect x="58" y="263" width="40" height="7" rx="2"/>
  </g>
  <!-- Flag fabric in purple, shaped as an Ohio burgee (swallowtail). 13:8
       proportions: hoist 81-230 (149 wide), top 50, bottom 138 (88 tall),
       swallowtail notch cut 5/13 of the way in from the fly to apex at
       vertical center. -->
  <path fill="#7c3aed" d="M 81,50
                          L 230,50
                          L 173,94
                          L 230,138
                          L 81,138
                          Z"/>

